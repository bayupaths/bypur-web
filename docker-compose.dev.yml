services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: my_portfolio_dev
    command: pnpm dev --host
    ports:
      - "${PORT:-3000}:3000"
      - "24678:24678"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file: .env
    environment:
      NODE_ENV: development

volumes:
  node_modules:
