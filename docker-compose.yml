services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: my_portfolio_app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
    networks:
      - portfolio_network

networks:
  portfolio_network:
    external: true
